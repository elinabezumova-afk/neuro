<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Программа домашних занятий</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #F7F6F3;
    color: #2C3E50;
    line-height: 1.5;
    padding: 24px 16px 60px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  .screen { display: none; }
  .screen.active { display: block; }
  .logo { font-size: 13px; color: #888; margin-bottom: 28px; letter-spacing: 0.04em; }

  .login-card {
    background: #fff; border: 1px solid #E5E3DC; border-radius: 14px;
    padding: 28px 24px; max-width: 380px; margin: 40px auto 0;
  }
  .login-card h2 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .login-card p { font-size: 13px; color: #888; margin-bottom: 20px; line-height: 1.5; }
  input[type=text], input[type=number], textarea {
    width: 100%; padding: 10px 12px; border: 1px solid #DDD; border-radius: 8px;
    font-size: 14px; font-family: inherit; background: #fff; color: #2C3E50;
  }
  input[type=text]:focus, input[type=number]:focus, textarea:focus { outline: none; border-color: #4A9B8E; }
  .login-card input { margin-bottom: 12px; }
  .error-msg { font-size: 12px; color: #C0392B; margin: -4px 0 10px; min-height: 16px; }

  .btn-primary {
    display: inline-block; width: 100%; padding: 11px 16px;
    background: #1D9E75; color: #fff; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .btn-primary:hover { background: #178463; }
  .btn-sm {
    padding: 9px 18px; background: #1D9E75; color: #fff; border: none;
    border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .btn-sm:hover { background: #178463; }
  .btn-secondary {
    padding: 8px 16px; background: transparent; color: #2C3E50;
    border: 1px solid #DDD; border-radius: 8px; font-size: 13px;
    cursor: pointer; font-family: inherit;
  }
  .btn-secondary:hover { background: #F0EEE8; }

  .greeting { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #888; margin-bottom: 22px; }

  .week-progress { display: flex; gap: 8px; margin-bottom: 26px; }
  .day-dot { flex: 1; height: 6px; border-radius: 3px; background: #E5E3DC; transition: background .3s; }
  .day-dot.done { background: #1D9E75; }
  .day-dot.current { background: #5DCAA5; }

  .session-card {
    background: #fff; border: 1px solid #E5E3DC; border-radius: 14px;
    margin-bottom: 14px; overflow: hidden;
  }
  .session-header {
    padding: 16px 18px; display: flex; align-items: center;
    justify-content: space-between; cursor: pointer;
  }
  .session-header:hover { background: #FAFAF7; }
  .session-title { font-size: 15px; font-weight: 600; }
  .session-meta { font-size: 12px; color: #888; margin-top: 2px; }
  .session-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; white-space: nowrap; font-weight: 600; }
  .badge-locked { background: #F0EEE8; color: #999; }
  .badge-open { background: #E1F5EE; color: #0F6E56; }
  .badge-done { background: #EAF3DE; color: #3B6D11; }
  .session-body { padding: 0 18px 20px; border-top: 1px solid #EEEDE7; display: none; }
  .session-body.open { display: block; }

  .req-box {
    background: #F0EEE8; border-radius: 8px; padding: 10px 14px;
    font-size: 12.5px; color: #666; margin: 16px 0;
  }

  .scale-legend {
    background: #EFF6F4; border-radius: 8px; padding: 12px 14px;
    margin: 14px 0 18px; font-size: 12px; color: #555; line-height: 1.7;
  }
  .scale-legend strong { color: #2C3E50; font-weight: 600; }

  .exercise { padding: 16px 0; border-bottom: 1px solid #EEEDE7; }
  .exercise:last-of-type { border-bottom: none; }
  .ex-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .ex-time { font-size: 11px; color: #AAA; margin-bottom: 8px; }
  .ex-desc { font-size: 13.5px; color: #555; line-height: 1.6; white-space: pre-line; }
  .ex-harder { font-size: 12.5px; color: #999; font-style: italic; margin-top: 8px; line-height: 1.5; background: #FAFAF7; padding: 8px 10px; border-radius: 6px; }

  .stimulus { margin-top: 14px; }
  .stimulus img { width: 100%; border-radius: 8px; border: 1px solid #EEEDE7; display: block; }

  .pic-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-top: 10px; }
  .pic-cell { aspect-ratio: 1; border: 2px solid #E5E3DC; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: #fff; transition: border-color .15s; position: relative; }
  .pic-cell:hover { border-color: #BBB; }
  .pic-cell.selected { border-color: #4A9B8E; background: #EFF6F4; }
  .pic-cell.correct { border-color: #3B8E6A; background: #D4F0E4; }
  .pic-cell.wrong { border-color: #C0392B; background: #FDECEA; }
  .pic-letter { position: absolute; bottom: -18px; left: 0; right: 0; text-align: center; font-size: 10px; color: #999; }
  .pic-row-wrap { margin-bottom: 24px; position: relative; padding-bottom: 14px; }
  .pic-row-label { font-size: 12px; color: #888; margin-bottom: 8px; font-weight: 600; }
  .pic-fb { font-size: 12px; margin-top: 4px; min-height: 16px; }
  .pic-fb.ok { color: #1D9E75; font-weight: 600; }
  .pic-fb.no { color: #C0392B; }

  .diff-find-wrap { margin-top: 14px; }
  .diff-counter { font-size: 13px; color: #555; margin-bottom: 8px; }
  .diff-counter b { color: #1D9E75; }

  .ex-feedback { margin-top: 12px; }
  .ex-feedback-label { font-size: 11.5px; color: #999; margin-bottom: 6px; }
  .pill-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    padding: 5px 12px; border-radius: 20px; font-size: 12.5px;
    border: 1px solid #DDD; background: #fff; color: #777;
    cursor: pointer; font-family: inherit; transition: all .15s;
  }
  .pill:hover { border-color: #4A9B8E; }
  .pill.sel-easy { background: #E1F5EE; border-color: #1D9E75; color: #0F6E56; font-weight: 600; }
  .pill.sel-ok { background: #FAEEDA; border-color: #BA7517; color: #633806; font-weight: 600; }
  .pill.sel-hard { background: #FCEBEB; border-color: #A32D2D; color: #791F1F; font-weight: 600; }

  .feedback-section { margin-top: 22px; padding-top: 18px; border-top: 1px solid #EEEDE7; }
  .feedback-label { font-size: 12.5px; color: #666; margin-bottom: 8px; }
  .done-check { display: flex; align-items: center; gap: 8px; font-size: 13.5px; color: #555; margin-bottom: 16px; cursor: pointer; }
  .done-check input { width: 17px; height: 17px; cursor: pointer; accent-color: #1D9E75; }
  .time-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .time-row label { font-size: 12.5px; color: #666; white-space: nowrap; }
  .time-row input { width: 70px; }
  .comment-area { width: 100%; min-height: 70px; resize: vertical; font-size: 13.5px; }
  .submit-row { margin-top: 18px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .submit-msg { font-size: 12.5px; color: #0F6E56; font-weight: 600; display: none; }
  .submit-msg.visible { display: block; }
  .sending-msg { font-size: 12.5px; color: #888; display: none; }
  .sending-msg.visible { display: block; }
  .locked-msg { padding: 16px 18px; font-size: 13px; color: #AAA; font-style: italic; }
  .logout-row { margin-top: 28px; text-align: center; }
</style>
</head>
<body>
<div class="wrap">

<div class="logo">Программа домашних занятий</div>

<div id="screen-login" class="screen active">
  <div class="login-card">
    <h2>Добро пожаловать</h2>
    <p>Введите код, который вам прислал специалист</p>
    <input type="text" id="code-input" placeholder="Ваш код" autocomplete="off" />
    <div class="error-msg" id="login-error"></div>
    <button class="btn-primary" onclick="doLogin()">Войти</button>
  </div>
</div>

<div id="screen-main" class="screen">
  <div class="greeting" id="greeting">Привет!</div>
  <div class="sub">Программа на неделю · 4 занятия по 15 минут</div>
  <div class="week-progress">
    <div class="day-dot" id="dot-0"></div>
    <div class="day-dot" id="dot-1"></div>
    <div class="day-dot" id="dot-2"></div>
    <div class="day-dot" id="dot-3"></div>
  </div>
  <div id="sessions-list"></div>
  <div class="logout-row"><button class="btn-secondary" onclick="doLogout()">Выйти</button></div>
</div>

</div>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbwUlqOVl9Jqzz4HnvnPjEbZi4oUwchWTdnEMGhu6ELbjlZy1jmwFvSFN2AGgMp06uNGqw/exec';

const CODES = { 'DEMO': 'Демо', 'ИГНАТ': 'Игнат', 'ZOYA': 'Зоя', 'ARTEMIY': 'Артемий', 'NIKITA': 'Никита', 'A1': 'Ребёнок A1', 'A2': 'Ребёнок A2', 'A3': 'Ребёнок A3', 'A4': 'Ребёнок A4' };

const MYOFASCIAL = "Прокатываем мячиком стопы вдоль — от пальчиков до пятки и обратно, с лёгким нажимом. 7–10 повторов на каждой стопе.\nПрокатываем мячиком каждую руку от кончиков пальцев до локтя, 5 раз туда и обратно. Затем разворачиваем руку ладонью вверх и прокатываем тыльную сторону, затем боковую (рука ребром на мячике).";
const BREATHING = "Исходное положение — лежим на спине, ноги согнуты в коленях, руки вдоль тела прямые, ладони в пол. По команде «вдох» плавно делаем вдох носом, по команде «выдох» — выдох через рот (долгий и шумный). Повторить 8 циклов.";

function ballRelay(circles) {
  return `Исходное положение — взрослый и ребёнок стоят друг напротив друга. Руки согнуты в локтях, ладошки развёрнуты вверх, в правой руке у каждого мячик. Под ритмичный счёт передаём мячик: сначала в свою левую руку, затем в руку партнёра — и так по кругу. После каждой передачи ладонь возвращается в исходное положение!\nСчёт четвёрками: и-раз-и-два-и-три-и-четыре. На «и» ладони всегда раскрыты в исходном положении. До ${circles} кругов, затем начинаем заново, но с левой руки (направление меняется).`;
}

const SESSIONS = [
  {
    title: 'Занятие 1', meta: 'Регуляция · активное начало', req: 'Понадобятся: 2 мячика (теннисный или массажный, сопоставимого размера)',
    exercises: [
      { name: 'Миофасциальный релиз', time: '2–3 мин', desc: MYOFASCIAL },
      { name: 'Дыхание', time: '2 мин', desc: BREATHING },
      { name: 'Передача мячика по кругу', time: '4 мин', desc: ballRelay(10) },
      { name: 'Треугольный колпак', time: '3 мин', desc: 'Учим стих, а затем заменяем в нём одно слово жестом.\n«Колпак мой треугольный, треугольный мой колпак, а если не треугольный — то это не мой колпак».\nВыучили стих — теперь вместо слова «колпак» складываем руками домик над головой.' },
      { name: 'Охотник за словами', time: '3 мин', desc: 'Взрослый называет слова, ребёнок хлопает в ладоши, если услышит слово, подходящее под критерий (например: «это может летать» / «это белого цвета» / «это съедобное»). Темп можно увеличивать, если задание даётся легко.' },
    ]
  },
  {
    title: 'Занятие 2', meta: 'Переключение · поиск отличий', req: 'Понадобятся: 2 мячика (теннисный или массажный, сопоставимого размера)',
    exercises: [
      { name: 'Миофасциальный релиз', time: '2–3 мин', desc: MYOFASCIAL },
      { name: 'Дыхание', time: '2 мин', desc: BREATHING },
      { name: 'Передача мячика по кругу', time: '4 мин', desc: ballRelay(15) },
      { name: 'Болгария', time: '3 мин', desc: 'Отвечаем на вопросы молча, «по-болгарски»: если ответ «да» — качаем головой, если «нет» — кивком.\nВопросы простые и смешные, с провокацией: «Летом всегда идёт снег?», «Тебя зовут Степан?», «Ты любишь мороженое?» — 10–15 вопросов.' },
      { name: 'Найди отличия', time: '4 мин', desc: 'Посмотрите внимательно на две картинки — они почти одинаковые. Нужно найти 3 отличия и объяснить словами, в чём они состоят.', stimulus: 'diff_find' },
    ]
  },
  {
    title: 'Занятие 3', meta: 'Регуляция · повтори движение', req: 'Понадобятся: 2 мячика (теннисный или массажный, сопоставимого размера)',
    exercises: [
      { name: 'Миофасциальный релиз', time: '2–3 мин', desc: MYOFASCIAL },
      { name: 'Дыхание', time: '2 мин', desc: BREATHING },
      { name: 'Передача мячика по кругу', time: '4 мин', desc: ballRelay(15) },
      { name: 'Треугольный колпак (усложнение)', time: '3 мин', desc: 'Учим стих, заменяем одно слово жестом (как в занятии 1).\nЕсли это получается легко — добавляем второй жест: вместо слова «треугольный» складываем треугольник из пальцев. Итого два жеста подряд.' },
      { name: 'Повтори движение', time: '3 мин', desc: 'Взрослый делает и называет движение, ребёнок повторяет.\nКогда закрепили — взрослый иногда «ошибается»: слово не совпадает с действием. Ребёнок должен делать то, что слышит, а не то, что видит.' },
    ]
  },
  {
    title: 'Занятие 4', meta: 'Регуляция · найди одинаковые', req: 'Понадобятся: 2 мячика (теннисный или массажный, сопоставимого размера)',
    exercises: [
      { name: 'Миофасциальный релиз', time: '2–3 мин', desc: MYOFASCIAL },
      { name: 'Дыхание', time: '2 мин', desc: BREATHING },
      { name: 'Передача мячика по кругу', time: '4 мин', desc: ballRelay(15) },
      { name: 'Треугольный колпак (усложнение)', time: '3 мин', desc: 'Стих + два жеста подряд, как в занятии 3: «колпак» — домик руками, «треугольный» — треугольник из пальцев.' },
      { name: 'Найди две одинаковые картинки', time: '4 мин', desc: 'В каждом задании 6 картинок. Две из них полностью одинаковые, остальные четыре — с небольшими отличиями. Найди и отметь пару.', stimulus: 'pic_match' },
    ]
  },
];

const PIC_MATCH_TASKS = [
  {
    label: 'Задание 1 — домик', answer: [1, 4],
    items: [
      () => `<svg viewBox="0 0 56 56" width="100%" height="100%"><polygon points="28,6 8,24 48,24" fill="#E8834A" stroke="#C06030" stroke-width="1.2"/><rect x="12" y="24" width="32" height="22" rx="2" fill="#F5D5B0" stroke="#C06030" stroke-width="1.2"/><rect x="22" y="30" width="12" height="16" rx="1" fill="#A0C8E8"/></svg>`,
      () => `<svg viewBox="0 0 56 56" width="100%" height="100%"><polygon points="28,10 8,26 48,26" fill="#E8834A" stroke="#C06030" stroke-width="1.2"/><rect x="12" y="26" width="32" height="20" rx="2" fill="#F5D5B0" stroke="#C06030" stroke-width="1.2"/><rect x="22" y="30" width="12" height="14" rx="1" fill="#A0C8E8"/></svg>`,
      () => `<svg viewBox="0 0 56 56" width="100%" height="100%"><polygon points="28,10 8,26 48,26" fill="#E8834A" stroke="#C06030" stroke-width="1.2"/><rect x="12" y="26" width="32" height="20" rx="2" fill="#F5D5B0" stroke="#C06030" stroke-width="1.2"/><rect x="14" y="30" width="12" height="14" rx="1" fill="#A0C8E8"/></svg>`,
      () => `<svg viewBox="0 0 56 56" width="100%" height="100%"><polygon points="28,10 8,26 48,26" fill="#E8834A" stroke="#C06030" stroke-width="1.2"/><rect x="12" y="26" width="32" height="20" rx="2" fill="#F5D5B0" stroke="#C06030" stroke-width="1.2"/></svg>`,
      () => `<svg viewBox="0 0 56 56" width="100%" height="100%"><polygon points="28,10 8,26 48,26" fill="#E8834A" stroke="#C06030" stroke-width="1.2"/><rect x="12" y="26" width="32" height="20" rx="2" fill="#F5D5B0" stroke="#C06030" stroke-width="1.2"/><rect x="22" y="30" width="12" height="14" rx="1" fill="#A0C8E8"/></svg>`,
      () => `<svg viewBox="0 0 56 56" width="100%" height="100%"><polygon points="28,10 8,26 48,26" fill="#5CAF70" stroke="#3A7A4A" stroke-width="1.2"/><rect x="12" y="26" width="32" height="20" rx="2" fill="#F5D5B0" stroke="#C06030" stroke-width="1.2"/><rect x="22" y="30" width="12" height="14" rx="1" fill="#A0C8E8"/></svg>`,
    ]
  },
  {
    label: 'Задание 2 — солнце', answer: [0, 5],
    items: [
      () => `<svg viewBox="0 0 56 56" width="100%" height="100%"><circle cx="28" cy="28" r="10" fill="#F5C842" stroke="#C8960A" stroke-width="1.2"/>${[0,45,90,135,180,225,270,315].map(a=>{const r=a*Math.PI/180,x1=28+14*Math.cos(r),y1=28+14*Math.sin(r),x2=28+22*Math.cos(r),y2=28+22*Math.sin(r);return`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#C8960A" stroke-width="2" stroke-linecap="round"/>`}).join('')}</svg>`,
      () => `<svg viewBox="0 0 56 56" width="100%" height="100%"><circle cx="28" cy="28" r="10" fill="#F5C842" stroke="#C8960A" stroke-width="1.2"/>${[0,60,120,180,240,300].map(a=>{const r=a*Math.PI/180,x1=28+14*Math.cos(r),y1=28+14*Math.sin(r),x2=28+22*Math.cos(r),y2=28+22*Math.sin(r);return`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#C8960A" stroke-width="2" stroke-linecap="round"/>`}).join('')}</svg>`,
      () => `<svg viewBox="0 0 56 56" width="100%" height="100%"><circle cx="28" cy="28" r="14" fill="#F5C842" stroke="#C8960A" stroke-width="1.2"/>${[0,45,90,135,180,225,270,315].map(a=>{const r=a*Math.PI/180,x1=28+18*Math.cos(r),y1=28+18*Math.sin(r),x2=28+24*Math.cos(r),y2=28+24*Math.sin(r);return`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#C8960A" stroke-width="2" stroke-linecap="round"/>`}).join('')}</svg>`,

let currentUser = null;
let progress = {};
let diffFoundCount = 0;

function loadProgress(code) {
  const raw = localStorage.getItem('neuro_app_' + code);
  return raw ? JSON.parse(raw) : { completed: [], feedback: {} };
}
function saveProgress() {
  localStorage.setItem('neuro_app_' + currentUser, JSON.stringify(progress));
}

function doLogin() {
  const val = document.getElementById('code-input').value.trim().toUpperCase();
  const err = document.getElementById('login-error');
  if (!CODES[val]) { err.textContent = 'Код не найден. Проверьте и попробуйте снова.'; return; }
  err.textContent = '';
  currentUser = val;
  progress = loadProgress(val);
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-main').classList.add('active');
  document.getElementById('greeting').textContent = 'Привет, ' + CODES[val] + '!';
  renderSessions();
}
function doLogout() {
  currentUser = null;
  document.getElementById('screen-main').classList.remove('active');
  document.getElementById('screen-login').classList.add('active');
  document.getElementById('code-input').value = '';
}

function renderSessions() {
  updateDots();
  const list = document.getElementById('sessions-list');
  list.innerHTML = '';
  SESSIONS.forEach((s, i) => {
    const isDone = progress.completed.includes(i);
    const isOpen = i === 0 || progress.completed.includes(i - 1);
    const badge = isDone ? '<span class="session-badge badge-done">Выполнено</span>'
      : isOpen ? '<span class="session-badge badge-open">Доступно</span>'
      : '<span class="session-badge badge-locked">Заблокировано</span>';
    const card = document.createElement('div');
    card.className = 'session-card';
    card.innerHTML = `
      <div class="session-header" onclick="toggleSession(${i})">
        <div><div class="session-title">${s.title}</div><div class="session-meta">${s.meta}</div></div>
        ${badge}
      </div>
      <div class="session-body" id="body-${i}">
        ${isOpen ? buildBody(i, s, isDone) : '<div class="locked-msg">Доступно после выполнения предыдущего занятия</div>'}
      </div>`;
    list.appendChild(card);
  });
}

function buildBody(idx, s, isDone) {
  const fb = progress.feedback[idx] || {};
  const legend = `<div class="scale-legend">
    <strong>Как оценивать выполнение:</strong><br>
    <strong>Легко</strong> — справился с первого раза, без помощи и быстро<br>
    <strong>Нормально</strong> — потребовалась небольшая помощь, были незначительные ошибки или неточности<br>
    <strong>Трудно</strong> — для выполнения требовалась развёрнутая помощь взрослого
  </div>`;

  const exHTML = s.exercises.map((ex, ei) => {
    const exFb = (fb.exercises || {})[ei] || {};
    const pills = ['легко','нормально','трудно'].map(d => {
      const sel = exFb.diff === d ? (d==='легко'?'sel-easy':d==='нормально'?'sel-ok':'sel-hard') : '';
      return `<button class="pill ${sel}" onclick="setExPill(${idx},${ei},'${d}',this)">${d}</button>`;
    }).join('');
    const stim = ex.stimulus ? `<div class="stimulus">${buildStimulus(idx, ei, ex.stimulus)}</div>` : '';
    return `<div class="exercise">
      <div class="ex-name">${ex.name}</div>
      <div class="ex-time">${ex.time}</div>
      <div class="ex-desc">${ex.desc}</div>
      ${ex.harder ? `<div class="ex-harder">${ex.harder}</div>` : ''}
      ${stim}
      <div class="ex-feedback">
        <div class="ex-feedback-label">Как прошло это упражнение?</div>
        <div class="pill-group" id="expills-${idx}-${ei}">${pills}</div>
      </div>
    </div>`;
  }).join('');

  return `
    ${s.req ? `<div class="req-box">${s.req}</div>` : ''}
    ${legend}
    ${exHTML}
    <div class="feedback-section">
      <label class="done-check">
        <input type="checkbox" id="done-${idx}" ${fb.done?'checked':''} onchange="setDone(${idx},this.checked)">
        Занятие выполнено полностью
      </label>
      <div class="time-row">
        <label class="feedback-label" style="margin:0">Сколько минут заняло:</label>
        <input type="number" min="1" max="60" placeholder="15" value="${fb.time||''}" oninput="setField(${idx},'time',this.value)">
      </div>
      <div class="feedback-label">С какими трудностями столкнулись?</div>
      <textarea class="comment-area" placeholder="Необязательно..." oninput="setField(${idx},'comment',this.value)">${fb.comment||''}</textarea>
      <div class="submit-row">
        <button class="btn-sm" onclick="submitSession(${idx})">Сохранить и завершить занятие</button>
        <span class="sending-msg" id="sending-${idx}">Отправляем...</span>
        <span class="submit-msg ${isDone?'visible':''}" id="msg-${idx}">Сохранено!</span>
      </div>
    </div>`;
}

function toggleSession(i) {
  document.getElementById('body-' + i).classList.toggle('open');
}

function handlePicClick(idx, ei, ti, ii, el) {
  const key = `pic-${idx}-${ei}-${ti}`;
  if (!progress.feedback[idx]) progress.feedback[idx] = {};
  if (!progress.feedback[idx].pics) progress.feedback[idx].pics = {};
  const state = progress.feedback[idx].pics[key] || { selected: [], done: false };
  if (state.done) return;
  const idxIn = state.selected.indexOf(ii);
  const wrap = document.getElementById(`picwrap-${idx}-${ei}-${ti}`);
  const cells = wrap.querySelectorAll('.pic-cell');
  if (idxIn >= 0) { state.selected.splice(idxIn,1); el.classList.remove('selected'); progress.feedback[idx].pics[key]=state; saveProgress(); return; }
  state.selected.push(ii);
  el.classList.add('selected');
  if (state.selected.length === 2) {
    const [a,b] = state.selected;
    const task = PIC_MATCH_TASKS[ti];
    const fb = document.getElementById(`picfb-${idx}-${ei}-${ti}`);
    if (task.answer.includes(a) && task.answer.includes(b)) {
      state.done = true;
      cells[a].classList.remove('selected'); cells[b].classList.remove('selected');
      cells[a].classList.add('correct'); cells[b].classList.add('correct');
      fb.textContent = 'Правильно!'; fb.className = 'pic-fb ok';
    } else {
      cells[a].classList.add('wrong'); cells[b].classList.add('wrong');
      fb.textContent = 'Не совсем — попробуйте ещё раз'; fb.className = 'pic-fb no';
      state.selected = [];
      setTimeout(()=>{ cells[a].classList.remove('wrong','selected'); cells[b].classList.remove('wrong','selected'); fb.textContent=''; fb.className='pic-fb'; }, 900);
    }
  }
  progress.feedback[idx].pics[key] = state;
  saveProgress();
}

function handleMatchClick(idx, ei, ti, letter, el) {
  const key = `match-${idx}-${ei}-${ti}`;
  if (!progress.feedback[idx]) progress.feedback[idx] = {};
  if (!progress.feedback[idx].matches) progress.feedback[idx].matches = {};
  const state = progress.feedback[idx].matches[key] || { selected: [], done: false };
  if (state.done) return;

  const idxIn = state.selected.indexOf(letter);
  if (idxIn >= 0) {
    state.selected.splice(idxIn, 1);
    el.classList.remove('sel-easy');
    progress.feedback[idx].matches[key] = state;
    saveProgress();
    return;
  }
  state.selected.push(letter);
  el.classList.add('sel-easy');

  if (state.selected.length === 2) {
    const answer = window.__matchAnswers[`${idx}-${ei}`][ti];
    const fb = document.getElementById(`matchfb-${idx}-${ei}-${ti}`);
    const sortedSel = [...state.selected].sort();
    const sortedAns = [...answer].sort();
    const isCorrect = sortedSel[0] === sortedAns[0] && sortedSel[1] === sortedAns[1];
    const btnA = document.getElementById(`matchbtn-${idx}-${ei}-${ti}-${state.selected[0]}`);
    const btnB = document.getElementById(`matchbtn-${idx}-${ei}-${ti}-${state.selected[1]}`);
    if (isCorrect) {
      state.done = true;
      btnA.classList.remove('sel-easy'); btnB.classList.remove('sel-easy');
      btnA.classList.add('sel-easy'); btnB.classList.add('sel-easy');
      fb.textContent = 'Правильно!'; fb.className = 'pic-fb ok';
    } else {
      btnA.classList.add('sel-hard'); btnB.classList.add('sel-hard');
      fb.textContent = 'Не совсем — попробуйте ещё раз'; fb.className = 'pic-fb no';
      setTimeout(() => {
        btnA.classList.remove('sel-easy','sel-hard'); btnB.classList.remove('sel-easy','sel-hard');
        fb.textContent = ''; fb.className = 'pic-fb';
        state.selected = [];
        progress.feedback[idx].matches[key] = state;
        saveProgress();
      }, 900);
    }
  }
  progress.feedback[idx].matches[key] = state;
  saveProgress();
}

function incDiff(idx, ei) {
  if (!progress.feedback[idx]) progress.feedback[idx] = {};
  const cur = (progress.feedback[idx].diffCount || 0);
  const next = Math.min(cur + 1, 3);
  progress.feedback[idx].diffCount = next;
  document.getElementById(`diffcount-${idx}-${ei}`).textContent = next;
  saveProgress();
}
function resetDiff(idx, ei) {
  if (!progress.feedback[idx]) progress.feedback[idx] = {};
  progress.feedback[idx].diffCount = 0;
  document.getElementById(`diffcount-${idx}-${ei}`).textContent = 0;
  saveProgress();
}

function setExPill(idx, ei, val, el) {
  if (!progress.feedback[idx]) progress.feedback[idx] = {};
  if (!progress.feedback[idx].exercises) progress.feedback[idx].exercises = {};
  if (!progress.feedback[idx].exercises[ei]) progress.feedback[idx].exercises[ei] = {};
  progress.feedback[idx].exercises[ei].diff = val;
  saveProgress();
  const group = document.getElementById(`expills-${idx}-${ei}`);
  const cls = val==='легко'?'sel-easy':val==='нормально'?'sel-ok':'sel-hard';
  group.querySelectorAll('.pill').forEach(p => p.classList.remove('sel-easy','sel-ok','sel-hard'));
  el.classList.add(cls);
}
function setDone(idx, val) {
  if (!progress.feedback[idx]) progress.feedback[idx] = {};
  progress.feedback[idx].done = val;
  saveProgress();
}
function setField(idx, field, val) {
  if (!progress.feedback[idx]) progress.feedback[idx] = {};
  progress.feedback[idx][field] = val;
  saveProgress();
}

async function submitSession(idx) {
  const fb = progress.feedback[idx] || {};
  const s = SESSIONS[idx];

  if (!fb.done) { alert('Отметьте, выполнено ли занятие'); return; }

  const missingDiff = [];
  s.exercises.forEach((ex, ei) => {
    const exFb = (fb.exercises || {})[ei] || {};
    if (!exFb.diff) missingDiff.push(ex.name);
  });
  if (missingDiff.length > 0) {
    alert('Пожалуйста, оцените сложность для каждого упражнения:\n\n' + missingDiff.join('\n'));
    return;
  }

  if (!fb.time || String(fb.time).trim() === '') {
    alert('Пожалуйста, укажите сколько минут заняло занятие');
    return;
  }

  const sending = document.getElementById('sending-' + idx);
  sending.classList.add('visible');
  const rows = s.exercises.map((ex, ei) => {
    const exFb = (fb.exercises || {})[ei] || {};
    return {
      code: currentUser, name: CODES[currentUser], session: s.title,
      exercise: ex.name, difficulty: exFb.diff || '',
      done: fb.done ? 'да' : 'нет',
      time: ei === 0 ? (fb.time || '') : '',
      comment: ei === 0 ? (fb.comment || '') : ''
    };
  });

  for (const row of rows) {
    try {
      await fetch(SHEETS_URL, { method: 'POST', mode: 'no-cors', headers: {'Content-Type':'application/json'}, body: JSON.stringify(row) });
      await new Promise(r => setTimeout(r, 350));
    } catch(e) {}
  }

  if (!progress.completed.includes(idx)) progress.completed.push(idx);
  saveProgress();
  sending.classList.remove('visible');
  document.getElementById('msg-' + idx).classList.add('visible');
  setTimeout(() => renderSessions(), 700);
}

function updateDots() {
  SESSIONS.forEach((_, i) => {
    const dot = document.getElementById('dot-' + i);
    dot.className = 'day-dot' + (progress.completed.includes(i) ? ' done' : (i===0||progress.completed.includes(i-1)) ? ' current' : '');
  });
}
</script>
</body>
</html>
